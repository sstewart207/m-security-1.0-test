<?xml version="1.0" encoding="UTF-8"?> <!-- -*- XML -*- -->
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Mommy Security v1.0 - Warmth & Protection For Your OS
  Session Bus Policy: Hard blocks xdg-desktop-portal age queries to protect privacy.
-->
<busconfig>
  <policy context="default">
    <!-- Hard deny on all calls to the age verification interface on the session bus -->
    <deny send_interface="org.freedesktop.AgeVerification1"/>
    <deny send_interface="org.freedesktop.portal.AgeVerification"/>
    <deny send_interface="org.freedesktop.portal.ParentalControls"/>
    <deny send_interface="org.freedesktop.impl.portal.ParentalControls"/>
    <deny send_interface="org.freedesktop.impl.portal.MommySecurity"/>
  </policy>
</busconfig>
