<?xml version="1.0" encoding="UTF-8"?> <!-- -*- XML -*- -->
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Mommy Security v1.0 - Warmth & Protection For Your OS
  System Bus Policy: Hard blocks D-Bus age verification queries to protect privacy.
-->
<busconfig>
  <policy context="default">
    <!-- Hard deny on all calls to the age verification interface -->
    <deny send_interface="org.freedesktop.AgeVerification1"/>
    <!-- Hard deny on potential userdb age queries -->
    <deny send_interface="org.freedesktop.home1.User" send_member="GetBirthDate"/>
    <deny send_interface="org.freedesktop.home1.Manager" send_member="GetUserRecord"/>
  </policy>
</busconfig>
